<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XPlusCRM - Analitik Platform</title>
    <link rel="dns-prefetch" href="https://api.xpluscrm.com" />
    <link rel="preconnect" href="https://api.xpluscrm.com" crossorigin />
  </head>
  <body>
    <div id="root">
      <!-- PERF: ultra-light boot skeleton to avoid blank screen on slow startup -->
      <div aria-label="Yükleniyor" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f9fafb;color:#111827;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;">
        <div style="width:min(560px,92vw);background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px 18px;box-shadow:0 10px 30px rgba(17,24,39,0.06);">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;">
            <div style="font-weight:800;letter-spacing:0.2px;">XPlusCRM</div>
            <div aria-hidden="true" style="width:10px;height:10px;border-radius:50%;background:#6366f1;"></div>
          </div>
          <div style="height:12px;border-radius:8px;background:#f3f4f6;margin:10px 0;"></div>
          <div style="height:12px;border-radius:8px;background:#f3f4f6;margin:10px 0;width:70%;"></div>
          <div style="height:12px;border-radius:8px;background:#f3f4f6;margin:10px 0;width:60%;"></div>
          <div style="margin-top:10px;font-size:12px;color:#6b7280;">Uygulama hazırlanıyor…</div>
        </div>
      </div>
    </div>
    <script>
      (function() {
        try {
          var saved = JSON.parse(localStorage.getItem('theme-store') || '{}');
          var theme = saved && saved.state && saved.state.activeTheme;
          document.documentElement.setAttribute('data-theme', theme || 'default');
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'default');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
