version: '3.8'

services:
  # PostgreSQL Veritabanı
  postgres:
    image: postgres:16-alpine
    container_name: powerbi_postgres
    environment:
      POSTGRES_DB: powerbi_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    # Bellek sınırlamaları: büyük join/sort işlemlerinde RAM'i frenle
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c effective_cache_size=2GB
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_connections=50
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d powerbi_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - powerbi_network

  # Backend API (build edildikten sonra)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: powerbi_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://user:password@postgres:5432/powerbi_db
      JWT_SECRET: your_jwt_secret_key_here
      JWT_EXPIRY: 7d
    deploy:
      resources:
        limits:
          memory: 3G
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - powerbi_network
    # Development için hot-reload
    volumes:
      - ./backend/src:/app/src

  # Frontend (development mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: powerbi_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - powerbi_network
    # Development için hot-reload
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  powerbi_network:
    driver: bridge
